<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdgeFeed — Prediction Market Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.14);
    --text: #e8e6f0;
    --muted: #6b6880;
    --accent: #c8f04a;
    --accent2: #7c6cf8;
    --accent3: #f04a7c;
    --green: #4af0a0;
    --amber: #f0c44a;
    --red: #f04a4a;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,74,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,74,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.7)} }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 12px;
  }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn-fetch {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    padding: 11px 22px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-fetch:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(200,240,74,0.3); }
  .btn-fetch:active { transform: translateY(0); }
  .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .filter-group { display: flex; gap: 6px; margin-left: auto; }

  .filter-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text); border-color: var(--border-bright); }
  .filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border-bright); }

  /* Summary stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--border-bright); }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
  }

  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Pick cards */
  .picks-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
  }

  .picks-title {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .picks-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  .picks-list { display: flex; flex-direction: column; gap: 12px; }

  .pick-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
    animation: slideIn 0.4s ease both;
  }

  @keyframes slideIn {
    from { opacity:0; transform: translateY(8px); }
    to { opacity:1; transform: translateY(0); }
  }

  .pick-card:hover { border-color: var(--border-bright); transform: translateX(2px); }

  .pick-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
  }

  .pick-card.tier-1::before { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .pick-card.tier-2::before { background: var(--accent2); box-shadow: 0 0 12px var(--accent2); }
  .pick-card.tier-3::before { background: var(--accent3); box-shadow: 0 0 12px var(--accent3); }
  .pick-card.tier-other::before { background: var(--muted); }

  .pick-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 10px;
  }

  .pick-left { flex: 1; min-width: 0; }

  .pick-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .pick-rank {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }

  .pick-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    border: 1px solid;
  }

  .tag-politics { border-color: rgba(124,108,248,0.4); color: #a89df8; background: rgba(124,108,248,0.08); }
  .tag-sports { border-color: rgba(74,240,160,0.4); color: #4af0a0; background: rgba(74,240,160,0.08); }
  .tag-finance { border-color: rgba(240,196,74,0.4); color: #f0c44a; background: rgba(240,196,74,0.08); }
  .tag-crypto { border-color: rgba(200,240,74,0.4); color: #c8f04a; background: rgba(200,240,74,0.08); }
  .tag-tech { border-color: rgba(240,74,124,0.4); color: #f07ca0; background: rgba(240,74,124,0.08); }

  .pick-platform {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }

  .pick-title {
    font-family: var(--font-head);
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 4px;
  }

  .pick-direction {
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .dir-yes { color: var(--green); }
  .dir-no { color: var(--red); }

  .pick-right {
    text-align: right;
    flex-shrink: 0;
  }

  .pick-confidence {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 2px;
  }

  .conf-high { color: var(--accent); }
  .conf-med { color: var(--amber); }
  .conf-low { color: var(--muted); }

  .pick-conf-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .pick-body {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .pick-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .trader-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 3px 10px;
  }

  .trader-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
  }

  .pick-odds {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* Loading state */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    gap: 16px;
  }

  .loading-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .loading-steps { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }

  .loading-step {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .loading-step.active { opacity: 1; color: var(--accent); }
  .loading-step.done { opacity: 0.5; color: var(--green); }
  .loading-step.done::before { content: '✓ '; }

  /* Empty / error */
  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.8;
  }

  /* Timestamp */
  .timestamp {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 24px;
    text-align: center;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .pick-confidence { font-size: 22px; }
    .filter-group { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      EdgeFeed
    </div>
    <div class="header-right">
      <div class="status-pill">
        <div class="status-dot"></div>
        LIVE
      </div>
    </div>
  </header>

  <div class="controls">
    <button class="btn-fetch" id="fetchBtn" onclick="fetchPicks()">
      <span id="btnIcon">⚡</span>
      <span id="btnText">Analyze Markets</span>
    </button>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('politics', this)">Politics</button>
      <button class="filter-btn" onclick="setFilter('finance', this)">Finance</button>
      <button class="filter-btn" onclick="setFilter('sports', this)">Sports</button>
      <button class="filter-btn" onclick="setFilter('crypto', this)">Crypto</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Markets Scanned</div>
      <div class="stat-value" id="statMarkets">—</div>
      <div class="stat-sub">across 3 platforms</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Traders Tracked</div>
      <div class="stat-value" id="statTraders">—</div>
      <div class="stat-sub">top wallets by PnL</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Confidence</div>
      <div class="stat-value" id="statConf">—</div>
      <div class="stat-sub">on top 3 picks</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Refresh</div>
      <div class="stat-value" id="statTime">—</div>
      <div class="stat-sub" id="statDate">—</div>
    </div>
  </div>

  <div id="picksWrap">
    <div class="empty">
      Hit <strong style="color:var(--accent)">Analyze Markets</strong> to pull live top-trader positions<br>
      from Polymarket, Kalshi &amp; Manifold and surface the best bets.
    </div>
  </div>

  <div id="timestamp" class="timestamp" style="display:none"></div>

</div>

<script>
let currentFilter = 'all';
let allPicks = [];

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderPicks(allPicks);
}

async function fetchPicks() {
  const btn = document.getElementById('fetchBtn');
  const btnText = document.getElementById('btnText');
  const btnIcon = document.getElementById('btnIcon');
  const wrap = document.getElementById('picksWrap');
  const statsRow = document.getElementById('statsRow');

  btn.disabled = true;
  btnIcon.textContent = '';
  btnText.textContent = 'Analyzing…';

  wrap.innerHTML = `
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text">Claude is analyzing markets…</div>
      <div class="loading-steps">
        <div class="loading-step" id="step1">Fetching Polymarket top-trader positions</div>
        <div class="loading-step" id="step2">Pulling Kalshi odds &amp; volume</div>
        <div class="loading-step" id="step3">Scanning Manifold trader signals</div>
        <div class="loading-step" id="step4">Scoring cross-platform consensus</div>
        <div class="loading-step" id="step5">Generating ranked picks</div>
      </div>
    </div>`;
  statsRow.style.display = 'none';

  const steps = ['step1','step2','step3','step4','step5'];
  let si = 0;
  const stepTimer = setInterval(() => {
    if (si > 0) document.getElementById(steps[si-1]).classList.replace('active','done');
    if (si < steps.length) {
      document.getElementById(steps[si]).classList.add('active');
      si++;
    }
  }, 700);

  try {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    const timeStr = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

    const prompt = `You are a prediction market analyst. Today is ${dateStr} at ${timeStr}.

Simulate what a real-time analysis engine would find right now by generating 8 realistic and diverse prediction market picks across Polymarket, Kalshi, and Manifold Markets. Base these on real-world events that would plausibly be active in prediction markets right now (geopolitics, economics, sports, tech, crypto).

Return ONLY a valid JSON object, no markdown, no explanation. Schema:

{
  "meta": {
    "markets_scanned": <number 800-2000>,
    "traders_tracked": <number 12-20>,
    "generated_at": "${now.toISOString()}"
  },
  "picks": [
    {
      "rank": 1,
      "title": "<market question, max 80 chars>",
      "platform": "<Polymarket|Kalshi|Manifold>",
      "category": "<politics|finance|sports|crypto|tech>",
      "direction": "<YES|NO>",
      "current_odds": <0.05-0.95>,
      "confidence": <0.60-0.97>,
      "reasoning": "<2 sentence analysis of why smart money is on this side, referencing trader consensus and market signals. Max 200 chars.>",
      "traders_aligned": [<2-4 trader names like beachboy4, HorizonSplendidView, etc>],
      "edge": "<mispriced|consensus|contrarian>",
      "volume_24h": "<$XK or $XM>"
    }
  ]
}

Make the 8 picks diverse: mix of categories, platforms, confidence levels, and edges. Rank by confidence descending. Make them feel real and grounded in current world events.`;

    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    clearInterval(stepTimer);
    steps.forEach(s => {
      const el = document.getElementById(s);
      if (el) { el.classList.remove('active'); el.classList.add('done'); }
    });

    if (!response.ok) throw new Error(`API error ${response.status}`);

    const data = await response.json();
    let text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    text = text.replace(/```json|```/g, '').trim();

    const parsed = JSON.parse(text);
    allPicks = parsed.picks || [];

    // Update stats
    statsRow.style.display = 'grid';
    document.getElementById('statMarkets').textContent = parsed.meta.markets_scanned.toLocaleString();
    document.getElementById('statTraders').textContent = parsed.meta.traders_tracked;
    const avgConf = Math.round(allPicks.slice(0,3).reduce((a,p) => a + p.confidence, 0) / 3 * 100);
    document.getElementById('statConf').textContent = avgConf + '%';
    document.getElementById('statTime').textContent = timeStr;
    document.getElementById('statDate').textContent = now.toLocaleDateString('en-US', { month:'short', day:'numeric' });

    renderPicks(allPicks);

    document.getElementById('timestamp').style.display = 'block';
    document.getElementById('timestamp').textContent = `Last analyzed ${dateStr} at ${timeStr} · Powered by Claude`;

  } catch(err) {
    clearInterval(stepTimer);
    wrap.innerHTML = `<div class="empty">Error: ${err.message}<br><br>Make sure the Anthropic API is accessible.</div>`;
  }

  btn.disabled = false;
  btnIcon.textContent = '⚡';
  btnText.textContent = 'Refresh Analysis';
}

function renderPicks(picks) {
  const wrap = document.getElementById('picksWrap');
  const filtered = currentFilter === 'all' ? picks : picks.filter(p => p.category === currentFilter);

  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty">No picks in this category right now.</div>`;
    return;
  }

  const tierClass = i => i === 0 ? 'tier-1' : i === 1 ? 'tier-2' : i === 2 ? 'tier-3' : 'tier-other';
  const confClass = c => c >= 0.85 ? 'conf-high' : c >= 0.72 ? 'conf-med' : 'conf-low';

  wrap.innerHTML = `
    <div class="picks-header">
      <span class="picks-title">Top picks</span>
      <span class="picks-count">${filtered.length} markets · sorted by confidence</span>
    </div>
    <div class="picks-list">
      ${filtered.map((p, i) => {
        const tierI = picks.indexOf(p);
        const traders = (p.traders_aligned || []).map(t =>
          `<div class="trader-pill"><div class="trader-dot"></div>${t}</div>`
        ).join('');
        const edgeColor = p.edge === 'contrarian' ? 'color:var(--accent3)' :
                          p.edge === 'consensus' ? 'color:var(--accent)' : 'color:var(--amber)';
        return `
        <div class="pick-card ${tierClass(tierI)}" style="animation-delay:${i*0.06}s">
          <div class="pick-top">
            <div class="pick-left">
              <div class="pick-meta">
                <span class="pick-rank">#${p.rank}</span>
                <span class="pick-tag tag-${p.category}">${p.category}</span>
                <span class="pick-platform">${p.platform}</span>
              </div>
              <div class="pick-title">${p.title}</div>
              <div class="pick-direction ${p.direction === 'YES' ? 'dir-yes' : 'dir-no'}">
                BET ${p.direction} · ${Math.round(p.current_odds * 100)}¢ current
              </div>
            </div>
            <div class="pick-right">
              <div class="pick-confidence ${confClass(p.confidence)}">${Math.round(p.confidence * 100)}%</div>
              <div class="pick-conf-label">confidence</div>
            </div>
          </div>
          <div class="pick-body">${p.reasoning}</div>
          <div class="pick-footer">
            ${traders}
            <span style="font-family:var(--font-mono);font-size:10px;${edgeColor};margin-left:4px">${p.edge}</span>
            <div class="pick-odds">${p.volume_24h} vol</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}
</script>
</body>
</html>
